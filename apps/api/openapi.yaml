openapi: 3.1.0
info:
  title: Modular House API (MVP)
  version: 0.1.0
  description: REST API for public content, enquiry submissions, and lightweight admin.
servers:
  - url: https://api.staging.modular.house
  - url: http://localhost:8080
paths:
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  time:
                    type: string
                    format: date-time
  /content/pages/{slug}:
    get:
      summary: Get page content by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Page content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '404':
          description: Not found
  /content/faqs:
    get:
      summary: List FAQs
      parameters:
        - name: product
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of FAQs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FAQ'
  /content/gallery:
    get:
      summary: List gallery items
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [garden-room, house-extension]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paged list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/GalleryItem'
                  total:
                    type: integer
  /submissions/enquiry:
    post:
      summary: Create enquiry submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionCreate'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
        '400':
          description: Validation error
        '429':
          description: Rate limit exceeded

  # ─── Admin Auth (Phase 1 — 2FA login flow) ────────────────────────────

  /admin/auth/login:
    post:
      tags: [auth]
      summary: Step 1 — verify credentials and issue a one-time code (no session yet)
      description: >
        Verifies email + password against the database. On success, issues a 6-digit OTP
        (hashed, 10m TTL), emails it via the SMTP mailer, and returns a challenge id. No access
        token is granted at this step. Account lockout (5 fails / 15m) and a generic 401 apply.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Credentials valid; OTP issued and emailed. Code-entry step required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorChallenge'
        '401':
          description: Generic invalid-credentials (also returned for unknown email or inactive account).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '423':
          description: Account temporarily locked after repeated failures.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Too many requests (IP rate limit).

  /admin/auth/verify-2fa:
    post:
      tags: [auth]
      summary: Step 2 — verify the one-time code and establish a session
      description: >
        Verifies the OTP for the given challenge. On success, returns a 15m access token and sets
        the rotating refresh-token cookie. Wrong code increments the per-code attempt count;
        5 wrong attempts or expiry invalidates the code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTwoFactorRequest'
      responses:
        '200':
          description: Code valid; authenticated session established.
          headers:
            Set-Cookie:
              description: httpOnly, Secure, SameSite=Strict refresh token.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400':
          description: Malformed request.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Incorrect, expired, consumed, or locked-out code.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/auth/resend-code:
    post:
      tags: [auth]
      summary: Request a new one-time code (subject to cooldown + window cap)
      description: >
        Invalidates any prior unexpired code and issues a new one. Enforces a 60s resend cooldown
        and a 5-per-15-minute window cap. Responses are neutral and never reveal account existence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendCodeRequest'
      responses:
        '200':
          description: If eligible, a new code was issued and emailed (neutral response).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NeutralAck' }
        '429':
          description: Cooldown not elapsed or window cap exceeded (neutral message).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/auth/forgot-password:
    post:
      tags: [auth]
      summary: Request a password-reset link
      description: >
        Always returns the same neutral confirmation regardless of whether the account exists.
        A single-use, 60m reset link is emailed only when the account exists. Cooldown 60s,
        window cap 5/15m apply; throttled requests silently skip issuance and still return
        the neutral 200 (F3 — no account-existence leak via a 429).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Neutral confirmation (no account-existence disclosure).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NeutralAck' }

  /admin/auth/reset-password:
    post:
      tags: [auth]
      summary: Consume a reset link and set a new password
      description: >
        Requires the new password twice (must match) and to satisfy the password policy
        (min 12, lower+upper+digit, not equal to current). On success, clears lockout and revokes
        all of the account's sessions; the user must sign in again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated; all sessions revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NeutralAck' }
        '400':
          description: Policy violation, mismatch, or malformed request (specific message).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: Reset link already used or expired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate the refresh token and mint a new access token
      description: >
        Reads the refresh cookie, rotates the token within its family (revoking the old one), and
        returns a new 15m access token. Reuse of a revoked token revokes the entire family.
      responses:
        '200':
          description: New access token issued; refresh cookie rotated.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '401':
          description: Missing, expired, or reused refresh token (family revoked on reuse).

  /admin/auth/logout:
    post:
      tags: [auth]
      summary: End the current session
      description: Revokes the current session's refresh-token family and clears the cookie.
      security: [{ bearerAuth: [] }]
      responses:
        '204':
          description: Session ended.
        '401':
          description: No valid session.

  /admin/auth/me:
    get:
      tags: [auth]
      summary: Current user identity, role, permissions, and profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Authenticated user profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '401':
          description: No valid session.

  # ─── Admin Settings (Phase 1) ────────────────────────────────────────

  /admin/settings/password:
    put:
      tags: [settings]
      summary: Change own password (settings page)
      description: >
        Requires the correct current password plus the new password twice (must match + meet policy).
        On success, revokes the account's other sessions; the acting session stays valid.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed; other sessions revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NeutralAck' }
        '400':
          description: Policy violation, mismatch, or wrong current password.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No valid session.
        '403':
          description: super_admin account is read-only in the panel.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/settings/photo:
    get:
      tags: [settings]
      summary: Retrieve the current profile photo bytes
      description: >
        Returns the authenticated user's profile photo as an image. 404 when none is set, so the
        client renders the initials fallback (G4/G6).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Profile photo image.
          content:
            image/png:
              schema: { type: string, format: binary }
            image/jpeg:
              schema: { type: string, format: binary }
            image/webp:
              schema: { type: string, format: binary }
        '401':
          description: No valid session.
        '404':
          description: No profile photo set (client renders initials fallback).
    put:
      tags: [settings]
      summary: Upload or replace the profile photo
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
              required: [photo]
      responses:
        '200':
          description: Photo saved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '400':
          description: Unsupported type (not png/jpeg/webp) or over 5 MB.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No valid session.
        '403':
          description: super_admin account is read-only in the panel.
    delete:
      tags: [settings]
      summary: Remove the profile photo (fall back to initials)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Photo removed; default avatar (initials) used.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '401':
          description: No valid session.
        '403':
          description: super_admin account is read-only in the panel.

  /admin/settings/preferences:
    get:
      tags: [settings]
      summary: Read the persisted theme mode and sidebar collapse state
      description: >
        Returns the server-stored preferences for authoritative cross-device load (the cookie/
        localStorage mirror is only the pre-paint cache).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current preferences.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Preferences' }
        '401':
          description: No valid session.
    put:
      tags: [settings]
      summary: Persist theme mode and sidebar collapse state
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferencesRequest'
      responses:
        '200':
          description: Preferences saved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Preferences' }
        '400':
          description: Invalid themeMode.
        '401':
          description: No valid session.

  # ─── Admin Content (feature-006, re-gated) ────────────────────────────

  /admin/pages:
    get:
      security:
        - bearerAuth: []
      summary: List pages
      responses:
        '200':
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Page'
    post:
      security:
        - bearerAuth: []
      summary: Create page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageWrite'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
  /admin/pages/{id}:
    get:
      security:
        - bearerAuth: []
      summary: Get page by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '404':
          description: Not found
    put:
      security:
        - bearerAuth: []
      summary: Update page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageWrite'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
    delete:
      security:
        - bearerAuth: []
      summary: Delete page
      responses:
        '204':
          description: Deleted

  /admin/gallery:
    get:
      security:
        - bearerAuth: []
      summary: List gallery items
      responses:
        '200':
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GalleryItem'
    post:
      security:
        - bearerAuth: []
      summary: Create gallery item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryItemWrite'
      responses:
        '201':
          description: Created
  /admin/gallery/{id}:
    put:
      security:
        - bearerAuth: []
      summary: Update gallery item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryItemWrite'
      responses:
        '200':
          description: Updated
    delete:
      security:
        - bearerAuth: []
      summary: Delete gallery item
      responses:
        '204':
          description: Deleted

  /admin/faqs:
    get:
      security:
        - bearerAuth: []
      summary: List FAQs
      responses:
        '200':
          description: List of FAQs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FAQ'
    post:
      security:
        - bearerAuth: []
      summary: Create FAQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FAQWrite'
      responses:
        '201':
          description: Created
  /admin/faqs/{id}:
    put:
      security:
        - bearerAuth: []
      summary: Update FAQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FAQWrite'
      responses:
        '200':
          description: Updated
    delete:
      security:
        - bearerAuth: []
      summary: Delete FAQ
      responses:
        '204':
          description: Deleted

  /admin/submissions:
    get:
      security:
        - bearerAuth: []
      summary: List submissions
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Submission'
  /admin/submissions/export.csv:
    get:
      security:
        - bearerAuth: []
      summary: Export submissions CSV
      responses:
        '200':
          description: CSV stream
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /admin/redirects:
    get:
      security:
        - bearerAuth: []
      summary: List redirects
      responses:
        '200':
          description: List of redirects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Redirect'
    post:
      security:
        - bearerAuth: []
      summary: Create redirect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedirectWrite'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Redirect'
  /admin/redirects/{id}:
    put:
      security:
        - bearerAuth: []
      summary: Update redirect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedirectWrite'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Redirect'
    delete:
      security:
        - bearerAuth: []
      summary: Delete redirect
      responses:
        '204':
          description: Deleted

  /admin/uploads/image:
    post:
      security:
        - bearerAuth: []
      summary: Upload gallery image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
        '400':
          description: Invalid type
        '413':
          description: Payload too large

  /sitemap.xml:
    get:
      summary: Sitemap
      responses:
        '200':
          description: XML sitemap
          content:
            application/xml:
              schema:
                type: string
  /robots.txt:
    get:
      summary: Robots policy
      responses:
        '200':
          description: robots.txt
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Redirect:
      type: object
      properties:
        id: { type: string }
        sourceSlug: { type: string }
        destinationUrl: { type: string, format: uri }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
    RedirectWrite:
      type: object
      required: [sourceSlug, destinationUrl]
      properties:
        sourceSlug: { type: string }
        destinationUrl: { type: string, format: uri }
        active: { type: boolean }
    Page:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        slug: { type: string }
        heroHeadline: { type: string }
        heroSubhead: { type: string }
        heroImageUrl: { type: string }
        sections:
          type: array
          items: { type: object }
        seoTitle: { type: string }
        seoDescription: { type: string }
        updatedAt: { type: string, format: date-time }
    PageWrite:
      type: object
      required: [title, slug]
      properties:
        title: { type: string }
        slug: { type: string }
        heroHeadline: { type: string }
        heroSubhead: { type: string }
        heroImageUrl: { type: string }
        sections:
          type: array
          items: { type: object }
        seoTitle: { type: string }
        seoDescription: { type: string }
    GalleryItem:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        caption: { type: string }
        category:
          type: string
          enum: [garden-room, house-extension]
        imageUrl: { type: string }
        altText: { type: string }
        projectDate: { type: string, format: date }
        publishStatus:
          type: string
          enum: [draft, published]
    GalleryItemWrite:
      type: object
      required: [title, category, imageUrl, altText]
      properties:
        title: { type: string }
        caption: { type: string }
        category:
          type: string
          enum: [garden-room, house-extension]
        imageUrl: { type: string }
        altText: { type: string }
        projectDate: { type: string, format: date }
        publishStatus:
          type: string
          enum: [draft, published]
    FAQ:
      type: object
      properties:
        id: { type: string }
        question: { type: string }
        answer: { type: string }
        displayOrder: { type: integer }
    FAQWrite:
      type: object
      required: [question, answer]
      properties:
        question: { type: string }
        answer: { type: string }
        displayOrder: { type: integer }
    Submission:
      type: object
      properties:
        id: { type: string }
        payload:
          type: object
          properties:
            firstName: { type: string }
            lastName: { type: string }
            email: { type: string, format: email }
            phone: { type: string }
            address: { type: string }
            eircode: { type: string }
            preferredProduct: { type: string }
            message: { type: string }
            consent: { type: boolean }
        sourcePageSlug: { type: string }
        consentFlag: { type: boolean }
        consentText: { type: string }
        createdAt: { type: string, format: date-time }
        emailLog:
          type: object
          additionalProperties: true
    SubmissionCreate:
      type: object
      required: [firstName, email, phone, consent]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        address: { type: string }
        eircode: { type: string }
        preferredProduct: { type: string }
        message: { type: string }
        consent:
          type: boolean
          const: true

    # ─── Phase 1 Auth + Settings schemas ─────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 255 }
        password: { type: string, minLength: 1, maxLength: 128 }
    TwoFactorChallenge:
      type: object
      required: [challengeId, message]
      properties:
        challengeId:
          type: string
          description: >
            Opaque, unguessable id binding the code-entry step to the user; stable across
            resend-code; resolves server-side to the account without exposing the email.
        message: { type: string, example: A verification code has been sent to your email. }
    VerifyTwoFactorRequest:
      type: object
      required: [challengeId, code]
      properties:
        challengeId: { type: string }
        code: { type: string, pattern: '^\d{6}$' }
    ResendCodeRequest:
      type: object
      required: [challengeId]
      properties:
        challengeId: { type: string }
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 255 }
    ResetPasswordRequest:
      type: object
      required: [token, newPassword, confirmPassword]
      properties:
        token: { type: string }
        newPassword: { type: string, minLength: 12, maxLength: 128 }
        confirmPassword: { type: string, minLength: 12, maxLength: 128 }
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword, confirmPassword]
      properties:
        currentPassword: { type: string, minLength: 1, maxLength: 128 }
        newPassword: { type: string, minLength: 12, maxLength: 128 }
        confirmPassword: { type: string, minLength: 12, maxLength: 128 }
    PreferencesRequest:
      type: object
      properties:
        themeMode: { type: string, enum: [light, dark, system] }
        sidebarCollapsed: { type: boolean }
    Preferences:
      type: object
      properties:
        themeMode: { type: string, enum: [light, dark, system] }
        sidebarCollapsed: { type: boolean }
    Session:
      type: object
      required: [accessToken, expiresIn, user]
      properties:
        accessToken: { type: string, description: JWT, 15-minute lifetime }
        expiresIn: { type: integer, example: 900 }
        user: { $ref: '#/components/schemas/Me' }
    Me:
      type: object
      required: [id, email, role, permissions]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        role: { type: string, example: admin }
        permissions:
          type: array
          items: { type: string, example: 'pages:view' }
        hasProfilePhoto: { type: boolean }
        isSuperAdmin: { type: boolean }
        preferences: { $ref: '#/components/schemas/Preferences' }
    NeutralAck:
      type: object
      required: [message]
      properties:
        message: { type: string }
    Error:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }